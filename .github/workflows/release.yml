name: Release

on:
  push:
    branches: [main]

# Don't race the "Build & Commit dist" workflow.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # create the "Version Packages" PR / push tags
  pull-requests: write # open & update the release PR

jobs:
  release:
    # Skip the auto dist-commit and the changesets version bump commit.
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci

      - name: Create release PR or publish to npm
        uses: changesets/action@v1
        with:
          # `npm run release` -> `changeset publish` (prepublishOnly rebuilds dist).
          publish: npm run release
          version: npm run version
          # Keep this message free of "[skip ci]": a squash merge of the Version
          # PR must still trigger this workflow and publish the release.
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
